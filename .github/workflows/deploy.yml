name: Build and Deploy (self-hosted runner)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Install Nginx
        run: |
          if ! command -v nginx &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y nginx
          fi
          sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled

      - name: Deploy container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          docker stop streamlit-container 2>/dev/null || true
          docker rm streamlit-container 2>/dev/null || true
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker run -d --name streamlit-container -p 8501:8501 --restart always \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            -e SERPAPI_API_KEY="$SERPAPI_API_KEY" \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Configure Nginx
        run: |
          sudo cp nginx/app.conf /etc/nginx/sites-available/streamlit
          sudo ln -sf /etc/nginx/sites-available/streamlit /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
          sudo nginx -t
          sudo systemctl restart nginx
